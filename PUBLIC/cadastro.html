<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CADASTRO</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <main>
        <div class="container d-flex justify-content align-items-center min-vh-100">
            <div class="card-cadastro">
                <div class="text-center mb-4">
                    <h2 class="titulo-pagina">Cadastro</h2>
                    <p class="subtitulo">Preencha os dados abaixo para realizar o seu registro completo no sistema.</p>

                </div>

                <form class="row g-3">
                    <div class="col-md-8">
                        <label for="nome" class="form-label">Nome Completo</label>
                        <input type=" text" class="form-control" id="nome" required>
                    </div>
                    <div class="col-md-4">
                        <label for="cpf" class="form-label">CPF</label>
                        <input type="text" class="form-control" id="cpf" placeholder="000.000.000-00" required>
                    </div>
                    <div class="col-md-4">
                        <label for="nascimento" class="form-label"> Data de nascimento</label>
                        <input type="date" class="form-control" id="nascimento" required>
                    </div>
                    <div class="col-md-4">
                        <label for="telefone" class="form-label">Telefone</label>
                        <input type="date" class="form-control" id="telefone" placeholder="(00)00000-0000" required>
                    </div>
                    <div class="col-md-12">
                        <label for="endereco" class="form-label">Endereço</label>
                        <input type="text" class="form-control" id="endereco">

                    </div>
                        <div class="col-md-5">
                            <label for="cidade" class="form-label">Cidade</label>
                            <input type="text" class="form-control" id="cidade" required>
                        </div>
                        <div class="col-md-3">
                            <label for="estado" class="form-label">Estado</label>
                            <input type="text" class="form-control" id="cep" placeholder="00000-000" required>
                        </div>
                </form>
            </div>

        </div>


    </main>


</body>

</html>
