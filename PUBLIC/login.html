<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="container">
        <h2 id="titulo-login">Login</h2>
        <form id="form-login">
            <div class="mb-3">
                <label for="email">Email</label>
                <input type="email" id="Email1" placeholder="Digite seu email" required>
            </div>
            <br>
            <div class="senha">
                <label for="senha">Senha</label>
                <input type="password" id="Senha1" placeholder="Digite a sua senha" required>
            </div>
            <br>
            <div class="botao">
                <button id="botao-envio" type="submit">Entrar</button>
            </div>
        </form>
        <div class="text">
            <p>Não tem conta? </p>
        </div>
    </div>






</body>

</html>
